name: ad_wf_troubleshoot_memory_limit
description: >
  Stored workflow for troubleshooting model_memory_limit issues (hard_limit/soft_limit). Implements a 7-step branching
  decision tree: (1) identify memory status, (2) check downstream false alarms (hard_limit causing missing-doc
  warnings), (3) analyze growth trend, (4) inspect model_size_stats thresholds, (5) compute principled estimate via
  Estimate Model Memory API, (6) CCS-specific checks, (7) recommend action (increase limit / reduce data / restructure).
  Trigger: 'My job hit memory limit', 'hard_limit', 'soft_limit'.
enabled: true
tags: ["anomaly-detection", "troubleshooting", "memory"]

inputs:
  - name: job_id
    type: string
    description: The anomaly detection job ID to troubleshoot

triggers:
  - type: manual

steps:
  # Step 1: Get current memory state
  - name: get_stats
    type: elasticsearch.request
    with:
      method: GET
      path: /_ml/anomaly_detectors/{{ inputs.job_id }}/_stats

  - name: get_config
    type: elasticsearch.request
    with:
      method: GET
      path: /_ml/anomaly_detectors/{{ inputs.job_id }}

  - name: memory_status
    type: console
    with:
      message: |
        MEMORY STATUS for {{ inputs.job_id }}:
        Stats: {{ steps.get_stats.output | json:2 }}

  # Step 2: Check for downstream false alarms
  - name: check_false_alarms
    type: elasticsearch.search
    with:
      index: .ml-notifications-*
      size: 10
      sort: "timestamp:desc"
      query:
        bool:
          filter:
            - term:
                job_id: "{{ inputs.job_id }}"
            - terms:
                level: ["warning", "error"]

  - name: false_alarm_analysis
    type: console
    with:
      message: |
        DOWNSTREAM FALSE ALARM CHECK:
        Recent warnings/errors: {{ steps.check_false_alarms.output.hits.hits | json:2 }}

        If hard_limit AND you see "missing documents" warnings:
        → These are SYMPTOMS of memory exhaustion, NOT ingest lag.
          The model cannot track new entities, so events for unknown entities
          are skipped, appearing as "missing documents".
          Fix: Increase model_memory_limit first.

  # Step 3: Analyze memory growth trend
  - name: memory_trend
    type: elasticsearch.request
    with:
      method: POST
      path: /.ml-anomalies-*/_search
      body:
        size: 0
        query:
          bool:
            filter:
              - term:
                  job_id: "{{ inputs.job_id }}"
              - term:
                  result_type: model_size_stats
        aggs:
          memory_over_time:
            date_histogram:
              field: timestamp
              fixed_interval: 1d
            aggs:
              model_bytes:
                max:
                  field: model_bytes
              total_entities:
                max:
                  field: total_by_field_count

  - name: trend_analysis
    type: console
    with:
      message: |
        MEMORY GROWTH TREND:
        {{ steps.memory_trend.output.aggregations | json:2 }}

        Classify the trend:
        - Stable plateau: Memory stabilized. Current limit may be appropriate
          if status is ok, or barely insufficient if soft_limit.
        - Linear growth: Entity cardinality is growing steadily (new hosts,
          users, services). Will eventually hit limit.
        - Exponential growth: Rapid cardinality explosion. Likely data or
          config issue (unbounded by_field, logging explosion).

  # Step 4-5: Inspect thresholds and estimate
  - name: thresholds_and_estimate
    type: console
    with:
      message: |
        THRESHOLD INSPECTION:
        From model_size_stats, check:
        - total_by_field_count > 100K? → by_field cardinality too high
        - total_partition_field_count > 10K? → partition explosion
        - total_category_count > 10K? → categorization unbounded
        Identify which field drives memory consumption.

        PRINCIPLED ESTIMATION:
        Run ad_estimate_memory_requirement workflow for this job.
        It will:
        1. Sample cardinality from source data
        2. Call POST _ml/anomaly_detectors/_estimate_model_memory
        3. Compare estimate vs current limit vs actual usage

  # Step 6-7: CCS checks and recommendations
  - name: recommendations
    type: console
    with:
      message: |
        CCS CHECK:
        If datafeed uses cross-cluster indices (remote_cluster:index pattern):
        - Check remote cluster connectivity: GET _remote/info
        - Note cardinality aggregation covers all clusters
        - Re-run estimation if remote cluster recently added

        RECOMMENDATIONS:

        Branch A — Increase limit:
        1. Use the estimate from ad_estimate_memory_requirement, rounded up
        2. Fallback: max(estimate, peak_model_bytes * 1.3)
        3. Remediation sequence:
           a) Stop datafeed: POST _ml/datafeeds/datafeed-{{ inputs.job_id }}/_stop
           b) Close job: POST _ml/anomaly_detectors/{{ inputs.job_id }}/_close
           c) Update: POST _ml/anomaly_detectors/{{ inputs.job_id }}/_update
              { "analysis_limits": { "model_memory_limit": "NEW_VALUE" } }
           d) Open job: POST _ml/anomaly_detectors/{{ inputs.job_id }}/_open
           e) Start datafeed: POST _ml/datafeeds/datafeed-{{ inputs.job_id }}/_start
        Use workflow: ad_update_model_memory_limit

        Branch B — Reduce data:
        - Filter datafeed query to exclude noisy/irrelevant data
        - Reduce influencer count (each adds memory overhead)
        - Partition into multiple focused jobs instead of one big job
        - Exclude high-cardinality fields from analysis

        Branch C — Extreme cases (multi-GB jobs):
        - Architectural restructuring required
        - Consider splitting by partition_field into separate jobs
        - Use population analysis (over_field) instead of per-entity (by_field)
          when possible — population uses less memory per entity
