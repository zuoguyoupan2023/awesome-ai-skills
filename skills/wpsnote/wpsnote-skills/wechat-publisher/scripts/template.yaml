# 微信公众号排版配置
# 修改此文件后重新运行脚本即可生效，无需改动代码
# 使用方法：python3 排版要求/md_to_html.py "推文/xxx/初稿.md"

# ─────────────────────────────────────────
# 主题色
# ─────────────────────────────────────────
colors:
  primary:    "rgb(255, 104, 39)"   # 主色：橙色（加粗、列表符号、高亮默认色）
  accent:     "rgb(0, 128, 255)"    # 强调色：蓝色（标题、引用边框、链接、表头）
  text:       "rgb(100, 106, 115)"  # 正文字色
  text_light: "rgb(153, 153, 153)"  # 次要文字（注释、标签）
  bg_block:   "rgb(245, 245, 245)"  # 引用块背景色
  border:     "rgb(230, 230, 230)"  # 边框、分隔线颜色

# ─────────────────────────────────────────
# 字体
# ─────────────────────────────────────────
fonts:
  body: "mp-quote, 'PingFang SC', -apple-system-font, BlinkMacSystemFont, 'Helvetica Neue', 'Hiragino Sans GB', 'Microsoft YaHei UI', 'Microsoft YaHei', Arial, sans-serif"
  mono: "'Menlo', 'Monaco', 'Courier New', monospace"

# ─────────────────────────────────────────
# 字号（px）
# ─────────────────────────────────────────
font_size:
  body:     16    # 正文
  h2:       18    # 一级标题（## 或 #）
  h3:       16    # 二级标题（###）
  note:     14    # 注释（~~文字~~）
  code:     13    # 代码块字号
  code_inline: 13 # 行内代码字号

# ─────────────────────────────────────────
# 行距 / 间距
# ─────────────────────────────────────────
spacing:
  line_height_body:  2.0   # 正文行距
  line_height_head:  1.6   # 标题行距
  line_height_quote: 1.8   # 引用行距
  paragraph_gap:     15    # 段落底部间距（px）
  h2_margin_top:     30    # h2 上间距（px）
  h3_margin_top:     20    # h3 上间距（px）

# ─────────────────────────────────────────
# 页面布局
# ─────────────────────────────────────────
layout:
  max_width:   677   # 内容最大宽度（px），677 是公众号推荐宽度
  padding:     20    # 内容区内边距（px）

# ─────────────────────────────────────────
# 功能开关
# ─────────────────────────────────────────
features:
  copy_button: true   # 是否显示「复制内容」按钮（仅 Web 端有效，粘贴到公众号后自动消失）
